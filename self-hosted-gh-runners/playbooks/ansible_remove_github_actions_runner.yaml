- name: Register & Start Runner
  hosts: servers
  remote_user: ubuntu

  tasks:
    - name: Stop Runner Service
      become: true
      ansible.builtin.command:
        chdir: /home/ubuntu/actions-runner/
        argv:
          - ./svc.sh
          - stop

    - name: Uninstall Runner Service
      become: true
      ansible.builtin.command:
        chdir: /home/ubuntu/actions-runner/
        argv:
          - ./svc.sh
          - uninstall

    - name: Change execution of remove scripts
      file: dest=~/setup-scripts/remove.sh mode=+x

    - name: Remove the runner
      ansible.builtin.command:
        argv:
          - /home/ubuntu/setup-scripts/remove.sh
          - "{{ACCESS_TOKEN}}"
          - "{{ORG}}"
